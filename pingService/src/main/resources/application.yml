spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pingdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

app:
  name: dashboard-analyser

server:
  port: ${PORT:8080}

auth:
  token:
    expiry-hours: ${AUTH_TOKEN_EXPIRY_HOURS:24}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
